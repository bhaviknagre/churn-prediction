apiVersion: apps/v1
kind: Deployment
metadata: 
  name: churn-deployment
spec: 
  replicas: 1
  selector:
    matchLabels:
      app: churn-app
  template:
    metadata:
      labels:
        app: churn-app
    spec:
      containers:
      - name: churn-container
        image: churn-mlops:v1
        imagePullPolicy: Never
        ports:
        - containerPort: 8000